<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header-title">Leaderboard</h1>
            <p class="header-subtitle">Top performers based on contributions and activity</p>
            <div class="filters">
                <div class="filter-group">
                    <label for="department-filter">Department:</label>
                    <select id="department-filter">
                        <option value="all">All Departments</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="period-filter">Period:</label>
                    <select id="period-filter">
                        <option value="all-time">All Time</option>
                        <option value="this-month">This Month</option>
                        <option value="this-quarter">This Quarter</option>
                        <option value="this-year">This Year</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sort-by">Sort by:</label>
                    <select id="sort-by">
                        <option value="total-desc">Total (High to Low)</option>
                        <option value="total-asc">Total (Low to High)</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Podium section -->
        <div class="podium-section" id="podium-section"></div>

        <!-- Ranked list -->
        <div class="leaderboard" id="leaderboard"></div>
    </div>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
